<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SightSage - Voice-First Medicine Scanner</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body>
    <!-- HIGH CONTRAST TOGGLE -->
    <div class="theme-toggle">
        <button id="highContrastToggle" class="theme-btn" aria-label="Toggle high contrast" title="High Contrast Mode">🌓</button>
        <button id="textSizeToggle" class="theme-btn" aria-label="Increase text size" title="Large Text">Aa+</button>
        <button id="voiceSpeedToggle" class="theme-btn" aria-label="Adjust voice speed" title="Voice Speed">🐢</button>
    </div>

    <!-- MAIN APP -->
    <div class="app-container">
        <!-- HEADER -->
        <header class="glass-effect">
            <h1 class="gradient-text">SightSage</h1>
            <p class="subtitle">Point. Ask. Know.</p>
            <div class="version-badge">v2.0</div>
        </header>

        <!-- VOICE STATUS & INPUT -->
        <div class="voice-section glass-effect">
            <div class="voice-status" id="voiceStatus">
                <span class="status-icon">🎤</span>
                <span class="status-text">Ready - Tap "Scan Medicine" to start</span>
            </div>
            <div class="voice-controls">
                <button id="voiceButton" class="btn btn-primary btn-icon">
                    <span class="btn-icon">🎤</span>
                    <span class="btn-text">Voice Mode</span>
                </button>
                <button id="textInputButton" class="btn btn-secondary btn-icon">
                    <span class="btn-icon">⌨️</span>
                    <span class="btn-text">Type</span>
                </button>
            </div>
            
            <!-- Text fallback input -->
            <div id="textInputArea" class="text-input-area hidden">
                <input type="text" id="textQuestion" class="text-input" 
                       placeholder="Type your question... (e.g., 'what is this?')">
                <button id="submitText" class="btn btn-primary btn-small">Ask</button>
            </div>
        </div>

        <!-- CAMERA SECTION -->
        <div class="camera-section glass-effect">
            <div class="camera-container">
                <video id="camera" class="camera-preview" autoplay playsinline></video>
                <canvas id="captureCanvas" style="display: none;"></canvas>
                <div class="camera-overlay" id="cameraOverlay">
                    <div class="scanning-line"></div>
                    <div class="camera-guide">
                        <span>📸 Position medicine here</span>
                    </div>
                </div>
            </div>
            
            <div class="camera-controls">
                <button id="scanButton" class="btn btn-primary btn-large btn-icon">
                    <span class="btn-icon">📸</span>
                    <span class="btn-text">Scan Medicine</span>
                </button>
                <button id="compareButton" class="btn btn-secondary btn-icon">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">Compare</span>
                </button>
                <button id="sosButton" class="btn btn-sos btn-icon">
                    <span class="btn-icon">🆘</span>
                    <span class="btn-text">SOS</span>
                </button>
            </div>
        </div>

        <!-- RESULTS AREA -->
        <div id="results" class="results-card glass-effect hidden">
            <div class="results-header">
                <h3>📋 Analysis Results</h3>
                <button id="readAloudButton" class="btn btn-icon btn-small" title="Read Aloud">
                    <span class="btn-icon">🔊</span>
                </button>
            </div>
            <div id="scanResults" class="results-content"></div>
        </div>

        <!-- COMPARISON MODE -->
        <div id="comparisonMode" class="comparison-section glass-effect hidden">
            <h3>🔍 Compare Medicines</h3>
            <div class="comparison-container">
                <div class="medicine-slot" id="slot1">
                    <div class="slot-header">
                        <span class="slot-number">1</span>
                        <p id="medicine1Name" class="medicine-name">Medicine A</p>
                    </div>
                    <button id="captureForCompare1" class="btn btn-secondary btn-small">
                        <span class="btn-icon">📸</span>
                        <span>Scan First</span>
                    </button>
                </div>
                
                <div class="compare-divider">
                    <span class="divider-icon">⚡</span>
                </div>
                
                <div class="medicine-slot" id="slot2">
                    <div class="slot-header">
                        <span class="slot-number">2</span>
                        <p id="medicine2Name" class="medicine-name">Medicine B</p>
                    </div>
                    <button id="captureForCompare2" class="btn btn-secondary btn-small">
                        <span class="btn-icon">📸</span>
                        <span>Scan Second</span>
                    </button>
                </div>
            </div>
            
            <button id="performComparison" class="btn btn-primary btn-large compare-btn">
                <span class="btn-icon">🔄</span>
                <span>Compare Now</span>
            </button>
            
            <div id="comparisonResults" class="comparison-results hidden"></div>
        </div>

        <!-- EMERGENCY SECTION -->
        <div id="emergencyOverlay" class="emergency-overlay hidden">
            <div class="emergency-content glass-effect">
                <div class="emergency-header">
                    <span class="emergency-icon">🚨</span>
                    <h2>EMERGENCY INFO</h2>
                </div>
                <div id="emergencyDetails" class="emergency-details"></div>
                <button id="dismissEmergency" class="btn btn-light btn-large">
                    <span>Dismiss</span>
                </button>
            </div>
        </div>

        <!-- HISTORY & MEDICINE CABINET -->
        <div class="history-section glass-effect">
            <div class="history-header">
                <h3>📚 Medicine Cabinet</h3>
                <span class="history-count" id="cabinetCount">0</span>
            </div>
            <div id="medicineCabinet" class="cabinet-grid"></div>
        </div>

        <!-- SOS TRIPLE-TAP DETECTION -->
        <div id="sosWarning" class="sos-warning hidden">
            <span class="sos-icon">⚠️</span>
            <span>Triple-tap detected! SOS ready</span>
        </div>

        <!-- QUICK ACTIONS FLOATING MENU -->
        <div class="quick-actions">
            <button class="btn btn-floating" onclick="window.app?.toggleComparisonMode()" title="Compare">
                <span class="btn-icon">🔄</span>
            </button>
            <button class="btn btn-floating btn-sos" onclick="window.app?.handleSOS()" title="Emergency">
                <span class="btn-icon">🆘</span>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
